---
name: Test Ansible Playbook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Install Ansible Galaxy collections
        run: uv run ansible-galaxy collection install -r collections/requirements.yml

      - name: Run ansible-playbook syntax check
        run: uv run ansible-playbook local.yml --syntax-check

      - name: Run ansible-playbook in check mode
        run: uv run ansible-playbook local.yml --check
