---
name: Test Ansible Playbook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Install Ansible Galaxy collections
        run: uv run ansible-galaxy collection install -r collections/requirements.yml

      - name: Run ansible-playbook syntax check
        run: uv run ansible-playbook local.yml --syntax-check

      - name: Run ansible-playbook in check mode
        run: uv run ansible-playbook local.yml --check
