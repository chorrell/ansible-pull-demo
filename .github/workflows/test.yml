---
name: Test Ansible Playbook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Install Ansible Galaxy collections
        run: uv run ansible-galaxy collection install -r collections/requirements.yml

      - name: Run ansible-playbook syntax check
        run: uv run ansible-playbook local.yml --syntax-check

      - name: Run ansible-playbook in check mode
        run: uv run ansible-playbook local.yml --check
