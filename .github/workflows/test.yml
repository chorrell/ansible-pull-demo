---
name: Test Ansible Playbook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Install Ansible Galaxy collections
        run: uv run ansible-galaxy collection install -r collections/requirements.yml

      - name: Run ansible-playbook syntax check
        run: uv run ansible-playbook local.yml --syntax-check

      - name: Run ansible-playbook in check mode
        run: uv run ansible-playbook local.yml --check
